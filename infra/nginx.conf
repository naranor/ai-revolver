server {
    listen 8080;
    
    client_max_body_size 50M;

    location /health {
        proxy_pass http://localhost:8081;
    }
    
    location /mcp {
        proxy_pass http://localhost:8081;
    }
    
    location /api/ {
        proxy_pass http://localhost:8081;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }
    
    location / {
        root /app/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
